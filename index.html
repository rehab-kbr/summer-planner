<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>방학 자기주도학습 플래너 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F5F0;--surface:#FFF;--surface2:#F0EDE6;--border:#E2DDD6;--border2:#CCC7BE;
  --text:#1A1814;--text2:#6B6560;--text3:#9E9890;
  --geo:#4A3F8F;--geo-bg:#ECEAF8;--bio:#1B6B4A;--bio-bg:#E3F2EB;
  --eng:#7A4A0D;--eng-bg:#FBF0DC;--book:#8A2A1A;--book-bg:#FBECE9;
  --alg2:#1A5276;--alg2-bg:#D6EAF8;
  --accent:#C4832A;--r:12px;--rl:16px;
  --tab-h:60px;--hdr-h:56px;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.55}

/* ── HEADER ── */
.hdr{background:var(--text);color:#fff;padding:12px 16px;height:var(--hdr-h);display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:200}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.hdr-date{font-size:12px;color:rgba(255,255,255,.6);margin-top:1px}
.hdr-streak{background:var(--accent);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}

/* ── BOTTOM TAB NAV ── */
.tab-nav{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.tn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text3);font-family:inherit;padding:6px 0;transition:color .15s;min-height:44px}
.tn.on{color:var(--text)}
.tn-icon{font-size:20px;line-height:1}
.tn-lbl{font-size:10px;font-weight:500}
.tn.on .tn-icon{transform:scale(1.1)}

/* ── MAIN SCROLL AREA ── */
.main{position:fixed;top:var(--hdr-h);bottom:var(--tab-h);left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding:14px 14px 20px;min-height:100%}
.page.on{display:block}

/* ── SECTION TITLE ── */
.stitle{font-size:18px;font-weight:700;margin-bottom:2px;letter-spacing:-.3px}
.ssub{font-size:12px;color:var(--text2);margin-bottom:14px}

/* ── PILLS ── */
.pill{display:inline-block;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;line-height:1.4}
.pg{background:var(--geo-bg);color:var(--geo)}.pb{background:var(--bio-bg);color:var(--bio)}
.pe{background:var(--eng-bg);color:var(--eng)}.pr{background:var(--book-bg);color:var(--book)}

/* ── TODAY ── */
.today-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:12px}
.today-hero-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.today-date{font-size:19px;font-weight:700;letter-spacing:-.3px}
.today-badge{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:600}
.bs{background:var(--bio-bg);color:var(--bio)}.br{background:var(--surface2);color:var(--text2)}
.pbar-bg{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:6px}
.pbar-fill{height:100%;background:var(--bio);border-radius:3px;transition:width .4s}
.pbar-lbl{font-size:11px;color:var(--text2);margin-bottom:12px}
.task-list{display:flex;flex-direction:column;gap:8px}
.task-item{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;transition:border-color .15s;min-height:52px}
.task-item.done{opacity:.5}
.task-cb{width:22px;height:22px;border:2px solid var(--border2);border-radius:6px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent}
.task-item.done .task-cb{background:var(--bio);border-color:var(--bio);color:#fff}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;line-height:1.4}
.task-item.done .task-title{text-decoration:line-through}
.task-sub{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.4}
.task-time{font-size:12px;color:var(--text3);flex-shrink:0;padding-top:3px;font-weight:500}
.note-lbl{font-size:11px;font-weight:600;color:var(--text2);margin:16px 0 7px;text-transform:uppercase;letter-spacing:.05em}
.note-area{width:100%;min-height:80px;padding:12px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;font-family:inherit;color:var(--text);resize:none;outline:none}
.note-area:focus{border-color:var(--border2)}
.rest-msg{text-align:center;padding:50px 20px;color:var(--text2)}
.rest-msg .big{font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px}

/* ── PLANNER ── */
.week-block{margin-bottom:20px}
.week-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:7px 5px;min-height:78px;position:relative;cursor:pointer}
.day-card.off{background:var(--bg);opacity:.3;cursor:default;pointer-events:none}
.day-card.today{border-color:var(--accent);border-width:2px}
.day-card.alldone{border-color:var(--bio)}
.day-num{font-size:13px;font-weight:600;margin-bottom:1px;text-align:center}
.day-dow{font-size:9px;color:var(--text3);margin-bottom:4px;text-align:center}
.day-pills{display:flex;flex-direction:column;gap:2px}
.dp{font-size:8px;font-weight:600;padding:1px 3px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dp-g{background:var(--geo-bg);color:var(--geo)}.dp-b{background:var(--bio-bg);color:var(--bio)}
.dp-e{background:var(--eng-bg);color:var(--eng)}.dp-r{background:var(--book-bg);color:var(--book)}
.done-dot{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--bio);display:none}
.day-card.alldone .done-dot{display:block}

/* ── SCHEDULE ── */
.sched-day{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.sched-hdr{display:flex;align-items:center;gap:8px;padding:13px 14px;cursor:pointer;min-height:52px}
.sched-date{font-size:14px;font-weight:700;min-width:42px}
.sched-dow{font-size:12px;color:var(--text3);min-width:22px}
.sched-ps{display:flex;gap:3px;flex-wrap:wrap;flex:1}
.sched-t{font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap}
.sched-arr{font-size:12px;color:var(--text3);transition:transform .2s;margin-left:4px}
.sched-day.open .sched-arr{transform:rotate(180deg)}
.sched-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.sched-day.open .sched-body{display:block}
.sched-grid{display:flex;flex-direction:column;gap:6px;padding-top:10px}
.si{padding:10px 12px;border-radius:10px}
.si-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.si-title{font-size:13px;font-weight:600;margin-bottom:3px}
.si-note{font-size:12px;color:var(--text2);line-height:1.5}
.si-g{background:var(--geo-bg)}.si-g .si-lbl{color:var(--geo)}
.si-b{background:var(--bio-bg)}.si-b .si-lbl{color:var(--bio)}
.si-e{background:var(--eng-bg)}.si-e .si-lbl{color:var(--eng)}
.si-r{background:var(--book-bg)}.si-r .si-lbl{color:var(--book)}
.yt-link{font-size:12px;color:var(--geo);text-decoration:none;display:block;margin-top:4px;padding:4px 0}
.yt-link:hover{text-decoration:underline}

/* ── PROGRESS ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.stat-num{font-size:26px;font-weight:700;letter-spacing:-.5px}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.subj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px}
.subj-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.bar-bg{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:12px}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.ch-grid{display:flex;flex-wrap:wrap;gap:6px}
.ch-tag{font-size:12px;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);color:var(--text2);cursor:pointer;background:var(--bg);min-height:34px;display:flex;align-items:center}
.ch-tag.done{border-color:transparent}
.geo-d{background:var(--geo-bg);color:var(--geo)}.bio-d{background:var(--bio-bg);color:var(--bio)}
.eng-d{background:var(--eng-bg);color:var(--eng)}.book-d{background:var(--book-bg);color:var(--book)}
.alg2-d{background:var(--alg2-bg);color:var(--alg2)}


</style>

</div>

</div>

function buildTasks(ds){
  const d=SCHEDULE[ds];if(!d)return[];
  const tasks=[];
  const gl=getGeoLinks(ds);

  if(d.geo){
    // 개념강의 카드 — Study.com + Khan Academy
    tasks.push({id:'geo_concept',subj:'geo',
      title:'📖 개념강의 — '+d.geo.chapter,
      sub:d.geo.tasks[0],
      time:'40분', geoLinks:gl.concept});
    // 문제풀이 카드 — DeltaMath
    tasks.push({id:'geo_practice',subj:'geo',
      title:'✏️ 문제풀이 — '+d.geo.chapter,
      sub:d.geo.tasks[1],
      time:'35분', geoLinks:gl.practice});
    // 시각화 도구 링크 (GeoGebra / Desmos)
    gl.visual.forEach(function(lk,i){
      tasks.push({id:'geo_vis'+i,subj:'geo',
        title:lk.icon+' ['+lk.site+'] '+lk.title,
        sub:'시각화 도구',url:lk.url,time:'—',isLink:true});
    });
  }
  if(d.bio){
    d.bio.videos.forEach(function(v,i){
      tasks.push({id:'bio_v'+i,subj:'bio',title:v.title,sub:d.bio.chapter,url:v.url,time:'~20분'});
    });
    if(d.bio.note) tasks.push({id:'bio_note',subj:'bio',title:'용어 정리 & 복습',sub:d.bio.note,time:'20분'});
  }
  if(d.eng){
    tasks.push({id:'eng_lec',subj:'eng',
      title:'📝 '+d.eng.sec+' '+d.eng.title,
      sub:d.eng.note, url:d.eng.url, time:'95분', isEngLink:true});
  }
  if(d.alg2){
    tasks.push({id:'alg2_lec',subj:'alg2',
      title:'🔢 '+d.alg2.sec+' '+d.alg2.title,
      sub:d.alg2.note, url:d.alg2.url, time:'60분', isEngLink:true});
  }
  if(d.book){
    tasks.push({id:'book_read',subj:'book',title:'📚 원서 북리딩',sub:'깊이읽기 + 북토킹 준비',time:'120분'});
  }

  return tasks;
}

/* ─── Firebase 동기화 ─────────────────────────────────── */
var _fbTimer = null;

function fbSave() {
  if (!window._fbReady || !window._db) return;
  clearTimeout(_fbTimer);
  _fbTimer = setTimeout(function() {
    try {
      window._db.ref('planner/state').set(state)
        .then(function(){ showSync('✓ 동기화됨'); })
        .catch(function(e){ showSync('⚠ 저장 실패'); console.warn(e); });
    } catch(e){ showSync('⚠ 오프라인'); }
  }, 600);
}

function fbLoad(done) {
  if (!window._fbReady || !window._db) {
    window._fbLoadPending = function(){ fbLoad(done); };
    setTimeout(function(){
      if (window._fbLoadPending){
        window._fbLoadPending=null;
        if (done) done();
      }
    }, 4000);
    return;
  }
  // 1회 로드
  window._db.ref('planner/state').once('value').then(function(snap) {
    if (snap.exists()) {
      var fb = snap.val();
      if (fb && typeof fb === 'object') {
        ['tasks','chapters','notes','timetable'].forEach(function(k){
          if (fb[k]) state[k] = Object.assign(state[k]||{}, fb[k]);
        });
        try { localStorage.setItem('ssp_2026', JSON.stringify(state)); } catch(e){}
      }
    }
    showSync('🟢 연결됨');
    if (done) done();
  }).catch(function(e) {
    console.warn('fbLoad error:', e);
    showSync('⚠ 오프라인');
    if (done) done();
  });

  // 실시간 리스너 — 다른 기기 변경 감지
  window._db.ref('planner/state').on('value', function(snap) {
    if (!snap.exists()) return;
    var fb = snap.val();
    if (!fb || typeof fb !== 'object') return;
    var changed = false;
    ['tasks','chapters','notes'].forEach(function(k){
      if (!fb[k]) return;
      Object.keys(fb[k]).forEach(function(id){
        if (JSON.stringify((state[k]||{})[id]) !== JSON.stringify(fb[k][id])) {
          if (!state[k]) state[k]={};
          state[k][id] = fb[k][id];
          changed = true;
        }
      });
    });
    if (changed) {
      try { localStorage.setItem('ssp_2026', JSON.stringify(state)); } catch(e){}
      var active = document.querySelector('.page.on');
      if (active) {
        var id = active.id;
        if (id==='tab-today') renderToday();
        else if (id==='tab-prog') { renderProg(); renderStats(); }
      }
      renderWeekBadge(); updateTotalHours(); updateHdrDate();
      showSync('↓ 업데이트');
    }
  });
}

function fbSaveMom(ds, obj) {
  if (!window._fbReady || !window._db) return;
  try { window._db.ref('planner/mom/' + ds).set(obj); } catch(e){}
}
function fbLoadMom(ds, cb) {
  if (!window._fbReady || !window._db) { cb(loadMomComment(ds)); return; }
  window._db.ref('planner/mom/' + ds).once('value')
    .then(function(s){ cb(s.exists() ? s.val() : loadMomComment(ds)); })
    .catch(function(){ cb(loadMomComment(ds)); });
}

function showSync(msg) {
  var el = document.getElementById('sync-dot');
  if (!el) return;
  el.textContent = msg;
  clearTimeout(el._t);
  if (msg !== '🟢 연결됨') {
    el._t = setTimeout(function(){ el.textContent = '🟢 연결됨'; }, 3000);
  }
}

function renderPlan(){

    w.days.forEach(ds=>{
      const d=new Date(ds);
      const isStudy=isStudyDate(ds),isToday=ds===today,allDone=isStudy&&isDayAllDone(ds);
      const card=document.createElement('div');
      card.className='day-card'+(!isStudy?' off':'')+(isToday?' today':'')+(allDone?' alldone':'');

      card.innerHTML=`<div class="done-dot"></div><div class="day-dow">${DENS[d.getDay()]}</div><div class="day-num">${d.getDate()}</div>${sc?`<div class="day-pills"><div class="dp dp-g">${sc.geo.chapter.split(' ').slice(0,2).join(' ')}</div><div class="dp dp-b">${sc.bio.chapter.split(' ').slice(0,2).join(' ')}</div><div class="dp dp-e">${sc.eng.title.split(' ').slice(0,2).join(' ')}</div>${sc.alg2?`<div class="dp" style="background:var(--alg2-bg);color:var(--alg2)">${sc.alg2.sec} ${sc.alg2.title.split(' ').slice(0,1).join(' ')}</div>`:''} ${sc.book?'<div class="dp dp-r">Book 2h</div>':''}</div>`:''}`;
      if(isStudy) card.onclick=()=>go('today');
      grid.appendChild(card);

    const total=w.startDow+w.days.length;const rem=total%7===0?0:7-(total%7);
    for(let i=0;i<rem;i++) grid.appendChild(document.createElement('div'));
    block.appendChild(grid);el.appendChild(block);
  });
}

      const dt=DAY_TIMES[ds];
      const totalT=dt?minsToHM(dt.total):'';
      const tasks=buildTasks(ds).filter(t=>!t.isLink&&!t.isCarry);
      const doneCnt=tasks.filter(t=>state.tasks[ds]&&state.tasks[ds][t.id]).length;
      const allDone=tasks.length>0&&doneCnt===tasks.length;
      const d=new Date(ds+'T00:00:00');
      const dow=DENS[d.getDay()];
      const breakdownT=dt?`Geo ${minsToHM(dt.geo)} · Bio ${minsToHM(dt.bio)} · Gram ${minsToHM(dt.eng)}${dt.alg2?' · Alg2 '+minsToHM(dt.alg2):''}${dt.book?' · Book '+minsToHM(dt.book):''}` :'';
      const vids=sc.bio&&sc.bio.videos?sc.bio.videos.map(v=>`<a class="yt-link" href="${v.url}" target="_blank">${v.title}</a>`).join(''):'';
      const glLinks=sc.geo&&sc.geo.chapter?[...getGeoLinks(ds).concept,...getGeoLinks(ds).practice,...getGeoLinks(ds).visual].map(lk=>{
        const col=lk.site==='Study.com'?'var(--eng)':lk.site==='DeltaMath'?'#C0392B':'var(--geo)';
        return `<a class="yt-link" href="${lk.url}" target="_blank" style="color:${col};font-weight:600">${lk.icon} ${lk.site} — ${lk.title}</a>`;
      }).join('') :'';

      const dayEl=document.createElement('div');
      dayEl.className='sched-day'+(allDone?' alldone':'');
      dayEl.dataset.ds=ds;

      dayEl.innerHTML=`
        <div class="sched-hdr" onclick="this.parentElement.classList.toggle('open')">
          <span class="sched-date">${d.getMonth()+1}/${d.getDate()}</span>
          <span class="sched-dow">${dow}</span>
          <span class="sched-ps">
            ${sc.geo&&sc.geo.chapter?`<span class="pill pg">${sc.geo.chapter.split(' ').slice(0,2).join(' ')}</span>`:''}
            ${sc.bio&&sc.bio.chapter?`<span class="pill pb">${sc.bio.chapter.split(' ').slice(0,2).join(' ')}</span>`:''}
            ${sc.eng&&sc.eng.title?`<span class="pill pe">${sc.eng.title.split(' ').slice(0,2).join(' ')}</span>`:''}
            ${sc.alg2&&sc.alg2.sec?`<span class="pill" style="background:var(--alg2-bg);color:var(--alg2)">${sc.alg2.sec} ${sc.alg2.title.split(' ')[0]}</span>`:''}
            ${sc.book?'<span class="pill pr">Book 2h</span>':''}
          </span>
          <span class="sched-t" title="${breakdownT}">${totalT}</span>
          <span class="sched-arr">▾</span>
        </div>
        <div class="sched-body">
          <div class="sched-grid">
            ${sc.geo&&sc.geo.chapter?`<div class="si si-g">
              <div class="si-lbl">Geometry</div>
              <div class="si-title">${sc.geo.chapter}</div>
              <div class="si-note">${sc.geo.tasks?sc.geo.tasks.join(' · '):''}</div>
              <div class="si-note" style="margin-top:4px">${glLinks}</div>
            </div>`:''}
            ${sc.bio&&sc.bio.chapter?`<div class="si si-b">
              <div class="si-lbl">Biology</div>
              <div class="si-title">${sc.bio.chapter}</div>
              <div class="si-note">${vids}</div>
              <div class="si-note">${sc.bio.note||''}</div>
            </div>`:''}
            ${sc.eng&&sc.eng.title?`<div class="si si-e">
              <div class="si-lbl">Master English Grammar (Udemy)</div>
              <div class="si-title">${sc.eng.sec} ${sc.eng.title}</div>
              <div class="si-note">${sc.eng.note||''}<br><a class="yt-link" href="${sc.eng.url}" target="_blank" style="color:var(--eng);font-weight:600">🔗 Udemy 코스 열기 ↗</a></div>
            </div>`:''}
            ${sc.alg2&&sc.alg2.sec?`<div class="si" style="background:var(--alg2-bg)">
              <div class="si-lbl" style="color:var(--alg2)">Algebra 2</div>
              <div class="si-title">${sc.alg2.sec} ${sc.alg2.title}</div>
              <div class="si-note">${sc.alg2.note||''}<br><a class="yt-link" href="${sc.alg2.url}" target="_blank" style="color:var(--alg2);font-weight:600">🔗 JM Education ↗</a></div>
            </div>`:''}
            ${sc.book?`<div class="si si-r">
              <div class="si-lbl">Book Reading</div>
              <div class="si-title">깊이읽기 + 북토킹 준비</div>
              <div class="si-note">깊이읽기 60분 + 북토킹 준비 60분 = 2시간</div>
            </div>`:''}
          </div>
          <div class="sched-tasks" id="stasks-${ds}"></div>
        </div>`;
      block.appendChild(dayEl);

      // 열릴 때 체크 목록 렌더
      dayEl.querySelector('.sched-hdr').addEventListener('click', function(){
        setTimeout(()=>renderSchedTasks(ds), 10);
      });
    });
    el.appendChild(block);
  });
}

function renderSchedTasks(ds){
  const wrap=document.getElementById('stasks-'+ds);
  if(!wrap||!wrap.parentElement.parentElement.classList.contains('open')) return;
  const tasks=buildTasks(ds).filter(t=>!t.isLink&&!t.isCarry);
  if(!tasks.length){wrap.innerHTML='';return;}
  if(!state.tasks[ds]) state.tasks[ds]={};
  wrap.innerHTML='<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">'
    +'<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">완료 체크</div>'
    +'<div class="task-list" id="stlist-'+ds+'"></div></div>';
  const list=document.getElementById('stlist-'+ds);
  tasks.forEach(t=>{
    const isDone=!!state.tasks[ds][t.id];
    const SUBJ_COL={geo:'var(--geo)',bio:'var(--bio)',eng:'var(--eng)',alg2:'var(--alg2)',book:'var(--book)'};
    const SUBJ_BG={geo:'var(--geo-bg)',bio:'var(--bio-bg)',eng:'var(--eng-bg)',alg2:'var(--alg2-bg)',book:'var(--book-bg)'};
    const col=SUBJ_COL[t.subj]||'var(--text)';
    const bg=SUBJ_BG[t.subj]||'var(--surface)';
    const item=document.createElement('div');
    item.className='task-item'+(isDone?' done':'');
    item.style.cssText=`background:${bg};border-color:${isDone?'transparent':col+'44'};cursor:pointer;margin-bottom:6px`;
    item.innerHTML=`<div class="task-cb" style="${isDone?`background:${col};border-color:${col};color:#fff`:`border-color:${col}`}">${isDone?'✓':''}</div>
      <div class="task-body">
        <div class="task-title" style="color:${col};font-size:13px">${t.title}</div>
        ${t.sub?`<div class="task-sub">${t.sub}</div>`:''}
      </div>
      <div class="task-time" style="font-size:11px">${t.time}</div>`;
    item.onclick=()=>{
      state.tasks[ds][t.id]=!state.tasks[ds][t.id];
      saveState(); renderToday(); renderStats(); updateTotalHours(); renderWeekBadge();
      // 일정표 해당 날짜 갱신
      const dayEl=document.querySelector(`.sched-day[data-ds="${ds}"]`);
      if(dayEl){
        const allDone=buildTasks(ds).filter(t2=>!t2.isLink&&!t2.isCarry)
          .every(t2=>state.tasks[ds]&&state.tasks[ds][t2.id]);
        dayEl.classList.toggle('alldone',allDone);
      }
      renderSchedTasks(ds);
    };
    list.appendChild(item);
  });
}

function renderStats(){
  updateTotalHours();
  const daysDone=STUDY_DATES.filter(ds=>isDayAllDone(ds)).length;
  let total=0,done=0;
  STUDY_DATES.forEach(ds=>{const tasks=buildTasks(ds);const dt=state.tasks[ds]||{};total+=tasks.filter(t=>!t.isLink).length;done+=tasks.filter(t=>!t.isLink&&dt[t.id]).length;});
  const pct=total?Math.round(done/total*100):0;
  const geoCh=Object.values(state.chapters['geo']||{}).filter(Boolean).length;
  const bioCh=Object.values(state.chapters['bio']||{}).filter(Boolean).length;
  document.getElementById('stat-grid').innerHTML=`
    <div class="stat-card"><div class="stat-num">${daysDone}</div><div class="stat-lbl">완료 학습일 / 15</div></div>
    <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-lbl">전체 진행률</div></div>
    <div class="stat-card"><div class="stat-num">${geoCh}/5</div><div class="stat-lbl">Geometry</div></div>
    <div class="stat-card"><div class="stat-num">${bioCh}/8</div><div class="stat-lbl">Biology</div></div>`;
}

function renderProg(){
  const el=document.getElementById('prog-body');el.innerHTML='';
  const BAR={geo:'#7B72C4',bio:'#3A9E72',eng:'#C4832A',book:'#C4503A'};
  const DC={geo:'geo-d',bio:'bio-d',eng:'eng-d',book:'book-d'};
  Object.entries(SUBJECTS).forEach(([key,s])=>{
    if(!state.chapters[key]) state.chapters[key]={};
    const done=s.chapters.filter((_,i)=>state.chapters[key][i]).length;
    const pct=Math.round(done/s.chapters.length*100);
    const card=document.createElement('div');card.className='subj-card';
    card.innerHTML=`
      <div class="subj-hdr"><span style="font-size:14px;font-weight:600">${s.label}</span><span style="font-size:13px;color:var(--text2)">${done}/${s.chapters.length} · ${pct}%</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${BAR[key]||'#999'}"></div></div>
      <div class="ch-grid">${s.chapters.map((ch,i)=>`<div class="ch-tag ${state.chapters[key][i]?'done '+DC[key]:''}" onclick="toggleCh('${key}',${i})">${ch}</div>`).join('')}</div>`;
    el.appendChild(card);
  });
}

function toggleCh(key,idx){
  if(!state.chapters[key]) state.chapters[key]={};
  state.chapters[key][idx]=!state.chapters[key][idx];
  saveState(); renderProg(); renderStats();
}

// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function updateHdrDate(){
  var d=new Date(); var ds=todayStr();
  var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var dow=['일','월','화','수','목','금','토'];
  var el=document.getElementById('hdr-date');
  if(el) el.textContent=d.getDate()+' '+mo[d.getMonth()]+' ('+dow[d.getDay()]+')';
  // streak: 연속 완료일
  var streak=0;
  var sorted=[...STUDY_DATES].sort().reverse();
  for(var i=0;i<sorted.length;i++){
    if(sorted[i]>ds) continue;
    if(isDayAllDone(sorted[i])) streak++;
    else break;
  }
  var sel=document.getElementById('hdr-streak');
  if(sel) sel.textContent= streak>0 ? '🔥 '+streak+'일 연속' : '';
}

// ═══════════════════════════════════════════════════════════
// FEATURE 1: 누적 순공시간
// ═══════════════════════════════════════════════════════════
function calcTotalHours(){
  var total=0;
  STUDY_DATES.forEach(function(ds){
    var dt=DAY_TIMES[ds];
    if(!dt) return;
    var tasks=buildTasks(ds).filter(function(t){return !t.isLink&&!t.isCarry;});
    var done=tasks.filter(function(t){return state.tasks[ds]&&state.tasks[ds][t.id];}).length;
    var pct=tasks.length?done/tasks.length:0;
    total+=Math.round((dt.total||0)*pct);
  });
  return total;
}
function minsToHuman(m){
  if(m<60) return m+'분';
  var h=Math.floor(m/60),mn=m%60;
  return h+'시간'+(mn?' '+mn+'분':'');
}
function updateTotalHours(){
  var total=calcTotalHours();
  var el=document.getElementById('hdr-hours');
  if(el) el.textContent=total>0?'총 '+minsToHuman(total)+' 완료':'';
  var ph=document.getElementById('prog-total-h');
  var ps=document.getElementById('prog-total-sub');
  if(ph) ph.textContent=minsToHuman(total)||'0분';
  if(ps){
    var pct=STUDY_DATES.length?Math.round(total/(STUDY_DATES.length*300)*100):0;
    if(total===0) ps.textContent='방학 목표를 향해 달려가자!';
    else if(pct>=100) ps.textContent='🏆 목표 달성! 정말 대단해요!';
    else if(pct>=75) ps.textContent='🔥 거의 다 왔어요! '+pct+'% 달성';
    else if(pct>=50) ps.textContent='💪 절반 넘었어요! '+pct+'% 달성';
    else ps.textContent='🌱 꾸준히 가고 있어요! '+pct+'% 달성';
  }
}

// ═══════════════════════════════════════════════════════════
// FEATURE 2: 주간 달성률 배지
// ═══════════════════════════════════════════════════════════
function calcWeekRate(ds){
  var week=null;
  for(var i=0;i<WEEKS.length;i++){
    if(WEEKS[i].days.indexOf(ds)>=0){week=WEEKS[i];break;}
  }
  if(!week) return null;
  var total=0,done=0;
  week.days.forEach(function(d){
    var tasks=buildTasks(d).filter(function(t){return !t.isLink&&!t.isCarry;});
    total+=tasks.length;
    done+=tasks.filter(function(t){return state.tasks[d]&&state.tasks[d][t.id];}).length;
  });
  return total>0?{done:done,total:total,pct:Math.round(done/total*100),label:week.label}:null;
}
function renderWeekBadge(){
  var wrap=document.getElementById('week-badge-wrap');
  if(!wrap) return;
  var ds=todayStr();
  if(!isStudyDate(ds)){wrap.innerHTML='';return;}
  var r=calcWeekRate(ds);
  if(!r){wrap.innerHTML='';return;}
  var icon,cls,msg;
  if(r.pct===100){icon='🏆';cls='gold';msg='이번 주 완벽 달성!';}
  else if(r.pct>=80){icon='⭐';cls='gold';msg='이번 주 목표 달성!';}
  else if(r.pct>=50){icon='💪';cls='silver';msg='절반 이상 완료!';}
  else{icon='🌱';cls='';msg='오늘도 한 걸음씩!';}
  wrap.innerHTML='<div class="week-badge '+cls+'">'
    +'<div class="week-badge-icon">'+icon+'</div>'
    +'<div class="week-badge-info">'
    +'<div class="week-badge-title">'+msg+'</div>'
    +'<div class="week-badge-sub">'+r.label+' &middot; '+r.done+'/'+r.total+' 완료</div>'
    +'</div>'
    +'<div class="week-badge-pct">'+r.pct+'%</div>'
    +'</div>';
}

// ═══════════════════════════════════════════════════════════
// FEATURE 3: 챕터 완료 축하 (토스트 + 컨페티)
// ═══════════════════════════════════════════════════════════
function showChToast(msg){
  var t=document.getElementById('ch-toast');
  if(!t) return;
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
function launchConfetti(){
  var colors=['#4A3F8F','#1B6B4A','#C4832A','#8A2A1A','#1A5276','#F4C430'];
  for(var i=0;i<20;i++){
    (function(n){
      setTimeout(function(){
        var el=document.createElement('div');
        el.className='confetti-piece';
        el.style.left=Math.random()*100+'vw';
        el.style.top='65px';
        el.style.background=colors[Math.floor(Math.random()*colors.length)];
        el.style.animationDelay=(Math.random()*0.2)+'s';
        el.style.borderRadius=Math.random()>0.5?'50%':'2px';
        document.body.appendChild(el);
        setTimeout(function(){if(el.parentNode)el.remove();},1000);
      },n*35);
    })(i);
  }
}
function toggleCh(key,idx){
  if(!state.chapters[key]) state.chapters[key]={};
  var wasOn=!!state.chapters[key][idx];
  state.chapters[key][idx]=!wasOn;
  saveState();
  if(!wasOn&&state.chapters[key][idx]){
    var ch=SUBJECTS[key]&&SUBJECTS[key].chapters[idx]?SUBJECTS[key].chapters[idx]:'챕터';
    showChToast('🎉 '+ch+' 완료!');
    launchConfetti();
  }
  renderProg(); renderStats(); updateTotalHours();
}

// ═══════════════════════════════════════════════════════════
// FEATURE 4: 엄마 코멘트
// ═══════════════════════════════════════════════════════════
function loadMomComment(ds){
  try{return JSON.parse(localStorage.getItem('ssp_mom_'+ds)||'null');}catch(e){return null;}
}
function saveMomComment(){
  var ds=todayStr();
  var text=document.getElementById('mom-textarea').value.trim();
  if(!text) return;
  var obj={text:text,time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})};
  localStorage.setItem('ssp_mom_'+ds,JSON.stringify(obj));
  fbSaveMom(ds, obj);
  renderMomComment(ds);
  showChToast('💌 코멘트가 저장됐어요!');
}
function renderMomComment(ds){
  var view=document.getElementById('mom-comment-view');
  var textEl=document.getElementById('mom-comment-text');
  var timeEl=document.getElementById('mom-comment-time');
  var ta=document.getElementById('mom-textarea');
  if(!view) return;
  fbLoadMom(ds, function(data){
    if(data&&data.text){
      view.style.display='block';
      if(textEl) textEl.textContent=data.text;
      if(timeEl) timeEl.textContent=data.time||'';
      if(ta) ta.value=data.text;
    } else {
      view.style.display='none';
      if(ta) ta.value='';
    }
  });
}

fbLoad(function() {
  renderToday();
  renderStats();
  updateHdrDate();
  updateTotalHours();
  renderWeekBadge();
});
</script>
